<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ההזמנות שלי — נלחמים ביוקר המחיה</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, 'Segoe UI', Arial, sans-serif;
  background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
  min-height: 100vh;
  direction: rtl;
  color: #1a1a1a;
}
header {
  background: #15803d;
  color: white;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 12px rgba(21,128,61,0.3);
}
.header-inner {
  max-width: 480px;
  margin: 0 auto;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.back-btn {
  background: rgba(255,255,255,0.15);
  border: none;
  color: white;
  padding: 8px 12px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 1.1rem;
  text-decoration: none;
}
header h1 { font-size: 1.15rem; font-weight: 700; }
.container { max-width: 480px; margin: 0 auto; padding: 16px; }
.order-card {
  background: white;
  border-radius: 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  padding: 16px;
  margin-bottom: 14px;
}
.order-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.order-date { font-size: 0.82rem; color: #6b7280; }
.order-total { font-size: 1.1rem; font-weight: 800; color: #15803d; }
.order-items { font-size: 0.88rem; color: #374151; margin-bottom: 10px; line-height: 1.6; }
.order-status {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 0.78rem;
  font-weight: 700;
}
.status-pending { background: #fef3c7; color: #92400e; }
.status-paid { background: #d1fae5; color: #065f46; }
.status-handled { background: #f3f4f6; color: #6b7280; }
.empty-state { text-align: center; padding: 60px 20px; color: #6b7280; }
.empty-state .icon { font-size: 4rem; margin-bottom: 16px; }
.loading { text-align: center; padding: 40px; color: #15803d; font-size: 1.5rem; }

@media (min-width: 768px) {
  .header-inner { max-width: 800px; }
  .container { max-width: 800px; }
}
.skip-link { position:absolute; top:-40px; left:0; background:#15803d; color:white; padding:8px 16px; z-index:9999; border-radius:0 0 8px 0; text-decoration:none; font-weight:700; }
.skip-link:focus { top:0; }
*:focus { outline: 3px solid #15803d; outline-offset: 2px; }
</style>
</head>
<body>
<a href="#main-content" class="skip-link">דלג לתוכן הראשי</a>
<header>
  <div class="header-inner">
    <a href="index.html" class="back-btn" aria-label="חזרה לחנות">→</a>
    <h1>📦 ההזמנות שלי</h1>
  </div>
</header>
<main id="main-content">
<div class="container" id="container">
  <div class="loading">⏳</div>
</div>
<script>
var shopUser = JSON.parse(localStorage.getItem('shopUser') || 'null');
if (!shopUser) {
  window.location.href = '/login.html';
}
const API = '/api/shop';

function statusLabel(s) {
  if (s === 'paid') return '<span class="order-status status-paid">שולם ✅</span>';
  if (s === 'handled') return '<span class="order-status status-handled">טופל</span>';
  return '<span class="order-status status-pending">ממתין לתשלום</span>';
}

async function loadOrders() {
  var phone = shopUser.phone || '';
  if (!phone) {
    document.getElementById('container').innerHTML = '<div class="empty-state"><div class="icon">📦</div><div>לא נמצא מספר טלפון בפרופיל</div></div>';
    return;
  }
  try {
    var res = await fetch(API + '/orders/my?phone=' + encodeURIComponent(phone));
    var orders = await res.json();
    var el = document.getElementById('container');
    if (!Array.isArray(orders) || !orders.length) {
      el.innerHTML = '<div class="empty-state"><div class="icon">📦</div><div>אין הזמנות עדיין</div></div>';
      return;
    }
    el.innerHTML = orders.map(function(o) {
      var date = o.createdAt ? new Date(o.createdAt).toLocaleDateString('he-IL', {day:'numeric',month:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '';
      var itemsList = (o.items||[]).map(function(i) {
        return i.name + (i.variant ? ' (' + i.variant + ')' : '') + ' ×' + i.qty;
      }).join('<br>');
      return '<div class="order-card">' +
        '<div class="order-header">' +
        '<span class="order-date">' + date + '</span>' +
        '<span class="order-total">₪' + (o.totalAmount||0).toFixed(2) + '</span>' +
        '</div>' +
        '<div class="order-items">' + itemsList + '</div>' +
        (o.pickupLocation ? '<div style="font-size:0.8rem;color:#6b7280;margin-bottom:8px">📍 ' + o.pickupLocation + '</div>' : '') +
        statusLabel(o.status) +
        '</div>';
    }).join('');
  } catch(e) {
    document.getElementById('container').innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><div>שגיאה בטעינת הזמנות</div></div>';
  }
}
loadOrders();
</script>
</main>
</body>
</html>
