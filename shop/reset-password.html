<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>איפוס סיסמה — נלחמים ביוקר המחיה</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
.skip-link { position:absolute; top:-40px; left:0; background:#15803d; color:white; padding:8px 16px; z-index:9999; border-radius:0 0 8px 0; text-decoration:none; font-weight:700; }
.skip-link:focus { top:0; }
*:focus { outline: 3px solid #15803d; outline-offset: 2px; }
body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: linear-gradient(135deg, #f0fdf4, #dcfce7, #f0fdf4);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.card {
  background: white;
  border-radius: 28px;
  padding: 40px 32px;
  width: 100%;
  max-width: 440px;
  box-shadow: 0 8px 40px rgba(21,128,61,0.13);
  text-align: center;
}
h1 { font-size: 1.8rem; font-weight: 900; color: #15803d; margin-bottom: 8px; }
.sub { font-size: 1rem; color: #6b7280; margin-bottom: 24px; line-height: 1.7; }
.field { margin-bottom: 16px; text-align: right; }
.field label { display: block; font-size: 16px; font-weight: 700; color: #374151; margin-bottom: 7px; }
.field input { width: 100%; border: 2px solid #e8ecf5; border-radius: 14px; padding: 16px; font-size: 18px; font-family: inherit; outline: none; transition: border-color 0.2s; color: #111; }
.field input:focus { border-color: #15803d; }
.btn { width: 100%; background: linear-gradient(135deg, #15803d, #16a34a); color: white; border: none; padding: 18px; border-radius: 14px; font-size: 20px; font-weight: 900; cursor: pointer; margin-top: 6px; transition: opacity 0.2s; }
.btn:hover { opacity: 0.9; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.msg { border-radius: 10px; padding: 12px 16px; font-size: 16px; margin-top: 14px; display: none; text-align: center; }
.msg.error { background: #fef2f2; color: #dc2626; }
.msg.success { background: #f0fdf4; color: #15803d; }
.back-link { display: inline-block; margin-top: 20px; color: #15803d; font-size: 15px; text-decoration: none; font-weight: 700; }
.back-link:hover { text-decoration: underline; }
.eye-btn { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 18px; color: #6b7280; padding: 4px; }
@media (min-width: 900px) {
  .card { max-width: 520px; padding: 52px 48px; }
  h1 { font-size: 2.2rem; }
  .field input { font-size: 20px; padding: 18px; }
  .btn { font-size: 22px; padding: 20px; }
}
</style>
</head>
<body>
<a href="#main-content" class="skip-link">דלג לתוכן הראשי</a>
<main id="main-content">
<div class="card" id="resetCard">
  <h1>איפוס סיסמה</h1>
  <p class="sub">הזן סיסמה חדשה לחשבון שלך</p>

  <div class="field">
    <label for="newPassword">סיסמה חדשה</label>
    <div style="position:relative">
      <input type="password" id="newPassword" placeholder="לפחות 6 תווים" autocomplete="new-password" aria-required="true" style="padding-left:42px">
      <button type="button" onclick="togglePwd('newPassword',this)" class="eye-btn" aria-label="הצג סיסמה">👁</button>
    </div>
  </div>

  <div class="field">
    <label for="confirmPassword">אימות סיסמה</label>
    <div style="position:relative">
      <input type="password" id="confirmPassword" placeholder="הזן שוב את הסיסמה" autocomplete="new-password" aria-required="true" style="padding-left:42px">
      <button type="button" onclick="togglePwd('confirmPassword',this)" class="eye-btn" aria-label="הצג סיסמה">👁</button>
    </div>
  </div>

  <button class="btn" id="resetBtn" onclick="doReset()">עדכן סיסמה ←</button>

  <div class="msg" id="msgBox" role="alert" aria-live="assertive"></div>
</div>

<div class="card" id="successCard" style="display:none">
  <div style="font-size:3rem;margin-bottom:16px">✅</div>
  <h1>הסיסמה עודכנה!</h1>
  <p class="sub">הסיסמה שלך אופסה בהצלחה. כעת תוכל להתחבר עם הסיסמה החדשה.</p>
  <a href="/login.html" class="btn" style="display:block;text-decoration:none;text-align:center">כניסה לחשבון ←</a>
</div>

<div class="card" id="invalidCard" style="display:none">
  <div style="font-size:3rem;margin-bottom:16px">⚠️</div>
  <h1>קישור לא תקף</h1>
  <p class="sub">קישור האיפוס לא תקין או שפג תוקפו. אנא בקש קישור חדש.</p>
  <a href="/forgot-password.html" class="btn" style="display:block;text-decoration:none;text-align:center">בקש קישור חדש ←</a>
</div>
</main>

<script>
function togglePwd(id, btn) {
  var inp = document.getElementById(id);
  if (!inp) return;
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? '👁' : '🙈';
}

function showMsg(text, type) {
  var el = document.getElementById('msgBox');
  el.textContent = text;
  el.className = 'msg ' + type;
  el.style.display = 'block';
}

// Get token from URL
var token = new URLSearchParams(window.location.search).get('token');
if (!token) {
  document.getElementById('resetCard').style.display = 'none';
  document.getElementById('invalidCard').style.display = 'block';
}

async function doReset() {
  var password = document.getElementById('newPassword').value;
  var confirm = document.getElementById('confirmPassword').value;
  if (!password || password.length < 6) return showMsg('הסיסמה חייבת להכיל לפחות 6 תווים', 'error');
  if (password !== confirm) return showMsg('הסיסמאות לא תואמות', 'error');

  var btn = document.getElementById('resetBtn');
  btn.disabled = true;
  btn.textContent = 'מעדכן...';
  try {
    var res = await fetch('/api/shop/users/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: token, password: password })
    });
    var d = await res.json();
    if (d.error) return showMsg(d.error, 'error');
    document.getElementById('resetCard').style.display = 'none';
    document.getElementById('successCard').style.display = 'block';
  } catch(e) {
    showMsg('שגיאה — נסה שוב', 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'עדכן סיסמה ←';
  }
}
</script>
</body>
</html>
