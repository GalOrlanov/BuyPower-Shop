<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>שכחתי סיסמה — נלחמים ביוקר המחיה</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
.skip-link { position:absolute; top:-40px; left:0; background:#15803d; color:white; padding:8px 16px; z-index:9999; border-radius:0 0 8px 0; text-decoration:none; font-weight:700; }
.skip-link:focus { top:0; }
*:focus { outline: 3px solid #15803d; outline-offset: 2px; }
body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: linear-gradient(135deg, #f0fdf4, #dcfce7, #f0fdf4);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.card {
  background: white;
  border-radius: 28px;
  padding: 40px 32px;
  width: 100%;
  max-width: 440px;
  box-shadow: 0 8px 40px rgba(21,128,61,0.13);
  text-align: center;
}
h1 { font-size: 1.8rem; font-weight: 900; color: #15803d; margin-bottom: 8px; }
.sub { font-size: 1rem; color: #6b7280; margin-bottom: 24px; line-height: 1.7; }
.tabs { display: flex; gap: 6px; margin-bottom: 24px; background: #f3f4f6; border-radius: 14px; padding: 5px; }
.tab { flex: 1; padding: 12px; border-radius: 10px; font-size: 17px; font-weight: 700; cursor: pointer; border: none; background: transparent; color: #6b7280; transition: all 0.2s; }
.tab.active { background: white; color: #15803d; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
.field { margin-bottom: 16px; text-align: right; }
.field label { display: block; font-size: 16px; font-weight: 700; color: #374151; margin-bottom: 7px; }
.field input { width: 100%; border: 2px solid #e8ecf5; border-radius: 14px; padding: 16px; font-size: 18px; font-family: inherit; outline: none; transition: border-color 0.2s; color: #111; }
.field input:focus { border-color: #15803d; }
.btn { width: 100%; background: linear-gradient(135deg, #15803d, #16a34a); color: white; border: none; padding: 18px; border-radius: 14px; font-size: 20px; font-weight: 900; cursor: pointer; margin-top: 6px; transition: opacity 0.2s; }
.btn:hover { opacity: 0.9; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.msg { border-radius: 10px; padding: 12px 16px; font-size: 16px; margin-top: 14px; display: none; text-align: center; }
.msg.error { background: #fef2f2; color: #dc2626; }
.msg.success { background: #f0fdf4; color: #15803d; }
.back-link { display: inline-block; margin-top: 20px; color: #15803d; font-size: 15px; text-decoration: none; font-weight: 700; }
.back-link:hover { text-decoration: underline; }
@media (min-width: 900px) {
  .card { max-width: 520px; padding: 52px 48px; }
  h1 { font-size: 2.2rem; }
  .field input { font-size: 20px; padding: 18px; }
  .btn { font-size: 22px; padding: 20px; }
}
</style>
</head>
<body>
<a href="#main-content" class="skip-link">דלג לתוכן הראשי</a>
<main id="main-content">
<div class="card">
  <h1>שכחתי סיסמה</h1>
  <p class="sub">בחר כיצד לקבל קישור לאיפוס הסיסמה</p>

  <div class="tabs" role="tablist">
    <button class="tab active" role="tab" aria-selected="true" onclick="showTab('email')">📧 מייל</button>
    <button class="tab" role="tab" aria-selected="false" onclick="showTab('sms')">📱 SMS</button>
  </div>

  <!-- Email Tab -->
  <div id="emailForm">
    <div class="field">
      <label for="resetEmail">כתובת מייל</label>
      <input type="email" id="resetEmail" placeholder="name@email.com" dir="ltr" autocomplete="email" aria-required="true">
    </div>
    <button class="btn" id="emailBtn" onclick="doForgotEmail()">שלח קישור למייל ←</button>
  </div>

  <!-- SMS Tab -->
  <div id="smsForm" style="display:none">
    <div class="field">
      <label for="resetPhone">מספר טלפון</label>
      <input type="tel" id="resetPhone" placeholder="050-0000000" dir="ltr" autocomplete="tel" aria-required="true">
    </div>
    <button class="btn" id="smsBtn" onclick="doForgotSms()">שלח קישור ב-SMS ←</button>
  </div>

  <div class="msg" id="msgBox" role="alert" aria-live="assertive"></div>

  <a href="/login.html" class="back-link">← חזרה לכניסה</a>
</div>
</main>

<script>
function showTab(t) {
  var tabs = document.querySelectorAll('.tab');
  tabs[0].classList.toggle('active', t === 'email');
  tabs[0].setAttribute('aria-selected', t === 'email' ? 'true' : 'false');
  tabs[1].classList.toggle('active', t === 'sms');
  tabs[1].setAttribute('aria-selected', t === 'sms' ? 'true' : 'false');
  document.getElementById('emailForm').style.display = t === 'email' ? 'block' : 'none';
  document.getElementById('smsForm').style.display = t === 'sms' ? 'block' : 'none';
  hideMsg();
}

function showMsg(text, type) {
  var el = document.getElementById('msgBox');
  el.textContent = text;
  el.className = 'msg ' + type;
  el.style.display = 'block';
}
function hideMsg() { document.getElementById('msgBox').style.display = 'none'; }

async function doForgotEmail() {
  var email = document.getElementById('resetEmail').value.trim();
  if (!email || !email.includes('@')) return showMsg('נא להזין כתובת מייל תקינה', 'error');
  var btn = document.getElementById('emailBtn');
  btn.disabled = true;
  btn.textContent = 'שולח...';
  try {
    var res = await fetch('/api/shop/users/forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email, method: 'email' })
    });
    var d = await res.json();
    if (d.error) return showMsg(d.error, 'error');
    showMsg('אם המייל קיים במערכת, נשלח אליו קישור לאיפוס סיסמה. בדוק את תיבת הדואר שלך.', 'success');
  } catch(e) {
    showMsg('שגיאה — נסה שוב', 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'שלח קישור למייל ←';
  }
}

async function doForgotSms() {
  var phone = document.getElementById('resetPhone').value.trim().replace(/\D/g, '');
  if (phone.length < 9) return showMsg('נא להזין מספר טלפון תקין', 'error');
  var btn = document.getElementById('smsBtn');
  btn.disabled = true;
  btn.textContent = 'שולח...';
  try {
    var res = await fetch('/api/shop/users/forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone: phone, method: 'sms' })
    });
    var d = await res.json();
    if (d.error) return showMsg(d.error, 'error');
    showMsg('אם מספר הטלפון קיים במערכת, נשלח אליו SMS עם קישור לאיפוס סיסמה.', 'success');
  } catch(e) {
    showMsg('שגיאה — נסה שוב', 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'שלח קישור ב-SMS ←';
  }
}
</script>
</body>
</html>
