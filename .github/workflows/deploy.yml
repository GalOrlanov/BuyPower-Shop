name: Deploy to shop.buypower.co.il

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 64.23.156.254
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /root/.openclaw/workspace/BuyPower-Shop
            git fetch origin main
            git reset --hard origin/main
            cp api/src/api/routes/*.js api/dist/api/routes/ 2>/dev/null || true
            cp -v shop/*.html /var/www/shop/
            echo "=== nginx config ==="
            grep -r "root\|location.*shop" /etc/nginx/sites-enabled/ 2>/dev/null || grep -r "root\|location.*shop" /etc/nginx/conf.d/ 2>/dev/null
            echo "=== find admin.html ==="
            find / -name "admin.html" -path "*/shop/*" 2>/dev/null | head -10
            echo "=== sizes ==="
            for f in $(find / -name "admin.html" -path "*/shop/*" 2>/dev/null); do echo "$f: $(wc -c < $f) bytes"; done
            systemctl restart buypower-shop
            echo "✅ Deploy complete"
