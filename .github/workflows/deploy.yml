name: Deploy to shop.buypower.co.il

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 64.23.156.254
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /root/.openclaw/workspace/BuyPower-Shop
            git fetch origin main
            git reset --hard origin/main
            cp api/src/api/routes/*.js api/dist/api/routes/ 2>/dev/null || true
            cp -v shop/*.html /var/www/shop/
            cat /etc/nginx/sites-enabled/shop.buypower.co.il
            echo "=== NODE APP STATIC FILES ==="
            find /root/.openclaw/workspace/BuyPower-Shop/api -name "admin.html" 2>/dev/null | while read f; do echo "$f: $(wc -c < $f)"; done
            find /root/.openclaw/workspace/BuyPower-Shop -path "*/dist/*" -name "admin.html" 2>/dev/null | while read f; do echo "$f: $(wc -c < $f)"; done
            find /root/.openclaw/workspace/BuyPower-Shop -path "*/public/*" -name "admin.html" 2>/dev/null | while read f; do echo "$f: $(wc -c < $f)"; done
            systemctl restart buypower-shop
            nginx -s reload
            echo "✅ Deploy complete"
